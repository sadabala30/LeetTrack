<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetTrack — My DSA Journey</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;
  --s1:#0f0f1a;
  --s2:#161624;
  --s3:#1e1e30;
  --s4:#26263c;
  --border:#2a2a42;
  --border2:#36364e;
  --text:#eeeef5;
  --text2:#8888aa;
  --text3:#4a4a6a;
  --easy:#00e5a0;
  --easy-dim:#00e5a018;
  --med:#ffaa00;
  --med-dim:#ffaa0018;
  --hard:#ff3d5a;
  --hard-dim:#ff3d5a18;
  --acc:#6e5ff5;
  --acc2:#ff5fa0;
  --acc3:#00c8ff;
  --mono:'JetBrains Mono',monospace;
  --display:'Clash Display',sans-serif;
  --radius:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}

/* ── GLOW BLOBS ── */
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;opacity:.12}
.blob1{width:600px;height:600px;background:var(--acc);top:-200px;left:-200px}
.blob2{width:500px;height:500px;background:var(--acc2);bottom:-150px;right:-150px}
.blob3{width:400px;height:400px;background:var(--acc3);top:40%;left:40%}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(7,7,14,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-1px;display:flex;align-items:center;gap:4px}
.logo-leet{color:var(--text)}
.logo-track{color:var(--acc)}
.logo-dot{width:6px;height:6px;background:var(--easy);border-radius:50%;margin-left:2px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.topbar-right{display:flex;align-items:center;gap:10px}
.stat-chip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.stat-chip b{color:var(--text);font-weight:600}
.add-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;letter-spacing:.3px}
.add-btn:hover{opacity:.85}
.sync-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-family:var(--mono);font-size:11px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.sync-btn:hover{border-color:var(--border2);color:var(--text)}
.sync-btn.syncing .sync-icon{animation:spin 1s linear infinite}

/* ── HERO ── */
.hero{position:relative;z-index:1;padding:40px 28px 30px;border-bottom:1px solid var(--border)}
.hero-title{font-family:var(--display);font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1.1;margin-bottom:10px}
.hero-title .hi{color:var(--text3);font-size:14px;font-family:var(--mono);letter-spacing:2px;display:block;margin-bottom:6px;font-weight:400}
.hero-title .name{background:linear-gradient(135deg,var(--acc),var(--acc2),var(--acc3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--text2);font-size:13px;margin-bottom:24px}
.progress-section{max-width:500px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px}
.progress-label span{color:var(--easy);font-weight:600}
.progress-track{height:4px;background:var(--s3);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.hero-stats{display:flex;gap:20px;margin-top:20px}
.hstat{display:flex;flex-direction:column;gap:2px}
.hstat-val{font-family:var(--display);font-size:28px;font-weight:700;letter-spacing:-1px}
.hstat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr;position:relative;z-index:1;min-height:calc(100vh - 60px)}

/* ── SIDEBAR ── */
.sidebar{background:var(--s1);border-right:1px solid var(--border);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;display:flex;flex-direction:column}
.sb-search{padding:14px 14px 8px}
.sb-search input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
.sb-search input:focus{border-color:var(--acc)}
.sb-label{padding:8px 16px 4px;font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.sb-btn{width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;padding:8px 16px;font-family:var(--mono);font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.sb-btn.active{color:var(--text);background:var(--s2);border-left-color:var(--acc)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-cnt{font-size:10px;color:var(--text3)}

/* ── CONTENT ── */
.content{padding:24px 28px;overflow-y:auto}
.content-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.content-title{font-family:var(--display);font-size:22px;font-weight:700}
.filter-row{display:flex;gap:6px;align-items:center}
.diff-btn{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-family:var(--mono);font-size:11px;color:var(--text2);cursor:pointer}
.diff-btn.active{border-color:var(--acc);color:var(--text);background:var(--s3)}

/* ── PATTERN GROUP ── */
.pat-group{margin-bottom:20px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);animation:fadeIn .3s ease both}
.pat-group-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.pat-group-name{font-family:var(--display);font-size:14px;font-weight:600;color:#fff;flex:1}
.pat-solved{font-size:11px;font-weight:600}

/* ── PROBLEM ROW ── */
.prob-row{display:grid;grid-template-columns:52px 1fr 88px 40px 40px;align-items:center;border-bottom:1px solid var(--border);background:var(--s1);transition:background .12s}
.prob-row:hover{background:var(--s2)}
.prob-num{font-size:11px;color:var(--text3);text-align:center;padding:13px 0}
.prob-main{padding:13px 10px;display:flex;align-items:center;gap:10px}
.prob-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px}
.prob-check.checked{background:var(--easy);border-color:var(--easy);color:#000}
.prob-link{color:var(--text);text-decoration:none;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.diff-tag{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;text-align:center}
.diff-tag.Easy{color:var(--easy);background:var(--easy-dim)}
.diff-tag.Medium{color:var(--med);background:var(--med-dim)}
.diff-tag.Hard{color:var(--hard);background:var(--hard-dim)}
.note-toggle, .del-btn{width:40px;height:100%;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px}
.del-btn:hover{color:var(--hard)}

/* MODAL & UI COMPONENTS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;overflow:hidden}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.form-group{margin-bottom:14px; padding: 0 24px}
.form-label{font-size:10px;color:var(--text3);text-transform:uppercase;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);outline:none}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.btn-confirm{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-weight:600}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="topbar">
  <div class="logo">
    <span class="logo-leet">leet</span><span class="logo-track">track</span>
    <span class="logo-dot"></span>
  </div>
  <div class="topbar-right">
    <div class="stat-chip">Total <b id="s-total">0</b></div>
    <div class="stat-chip" style="color:var(--acc)">✓ Solved <b id="s-solved">0</b></div>
    <button onclick="openSettings()" class="sync-btn" style="background: var(--s3);">⚙️ Settings</button>
    <button class="add-btn" onclick="openAdd()">+ Add Problem</button>
  </div>
</div>

<div class="hero">
  <div class="hero-title">
    <span class="hi">// MY DSA JOURNEY</span>
    My <span class="name">LeetCode</span> Tracker
  </div>
  <div class="hero-sub">Auto-syncing to sadabala30/LeetTrack · GitHub Status: <span id="sync-status">Ready</span></div>
  <div class="progress-section">
    <div class="progress-label"><span>Progress</span><span id="progress-pct">0% solved</span></div>
    <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-search"><input type="text" placeholder="Search patterns..." id="sb-search" oninput="renderSidebar()"></div>
    <div id="sb-patterns"></div>
  </div>
  <div class="content">
    <div class="content-header">
      <div class="content-title" id="content-title">All Problems</div>
    </div>
    <div id="content-body"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settingsModal" class="modal-bg">
    <div class="modal">
        <div class="modal-head"><h3 class="modal-title">GitHub Automation Config</h3><button class="del-btn" onclick="closeSettings()">×</button></div>
        <div class="form-group"><br>
            <label class="form-label">Personal Access Token</label>
            <input type="password" id="ghTokenInput" class="form-input" placeholder="ghp_xxxxxxxxxxxx">
            <p style="font-size:10px; color:var(--text3); margin-top:5px">This token is stored locally to update your problems.json file.</p>
        </div>
        <div class="modal-foot">
            <button class="btn-confirm" onclick="saveSettings()">Save Config</button>
        </div>
    </div>
</div>

<!-- ADD MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">Add Problem</div><button class="del-btn" onclick="closeAdd()">✕</button></div>
    <div class="form-group"><br><label class="form-label">Problem #</label><input class="form-input" id="add-id" type="number"></div>
    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="add-name"></div>
    <div class="form-group"><label class="form-label">Slug</label><input class="form-input" id="add-slug"></div>
    <div class="form-group">
        <label class="form-label">Pattern</label>
        <select class="form-input" id="add-pat" style="background:var(--s2)"></select>
    </div>
    <div class="modal-foot"><button class="btn-confirm" onclick="confirmAdd()">Add to Repo</button></div>
  </div>
</div>

<script>
let patterns = [], solved = new Set(), activePattern = 'all';

async function load() {
    try {
        // Fetch fresh data from GitHub Pages[cite: 1]
        const resp = await fetch('https://sadabala30.github.io/LeetTrack/problems.json?t=' + Date.now());
        patterns = await resp.json();
    } catch (e) {
        console.error("Fetch failed, using local fallback");
        patterns = JSON.parse(localStorage.getItem('lt-patterns')) || [];
    }
    
    solved = new Set(JSON.parse(localStorage.getItem('lt-solved')) || []);
    renderSidebar();
    renderContent();
    updateStats();
}

async function pushToGitHub() {
    const token = localStorage.getItem('gh_token');
    if (!token) return;

    document.getElementById('sync-status').textContent = "Syncing...";
    try {
        const url = `https://api.github.com/repos/sadabala30/LeetTrack/contents/problems.json`;
        const fileRes = await fetch(url);
        const fileData = await fileRes.json();
        
        const update = await fetch(url, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: "Update problems via LeetTrack UI",
                content: btoa(JSON.stringify(patterns, null, 2)),
                sha: fileData.sha
            })
        });
        
        if(update.ok) document.getElementById('sync-status').textContent = "Synced ✓";
    } catch (e) { document.getElementById('sync-status').textContent = "Error"; }
}

function updateStats() {
    const allProbs = patterns.flatMap(p => p.problems);
    document.getElementById('s-total').textContent = allProbs.length;
    document.getElementById('s-solved').textContent = solved.size;
    const pct = allProbs.length ? Math.round((solved.size / allProbs.length) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '% solved';
}

function renderSidebar() {
    const container = document.getElementById('sb-patterns');
    container.innerHTML = `<button class="sb-btn ${activePattern==='all'?'active':''}" onclick="setPattern('all')">All Problems</button>`;
    patterns.forEach(p => {
        container.innerHTML += `<button class="sb-btn ${activePattern===p.name?'active':''}" onclick="setPattern('${p.name}')">${p.name}</button>`;
    });
}

function setPattern(name) { activePattern = name; renderSidebar(); renderContent(); }

function renderContent() {
    const body = document.getElementById('content-body');
    body.innerHTML = '';
    const toRender = activePattern === 'all' ? patterns : patterns.filter(p => p.name === activePattern);

    toRender.forEach(p => {
        const section = document.createElement('div');
        section.className = 'pat-group';
        section.innerHTML = `<div class="pat-group-header" style="background:${p.color}20"><span class="pat-group-name">${p.name}</span></div>`;
        
        p.problems.forEach(prob => {
            const isS = solved.has(prob.id);
            section.innerHTML += `
                <div class="prob-row">
                    <span class="prob-num">${prob.id}</span>
                    <div class="prob-main">
                        <div class="prob-check ${isS?'checked':''}" onclick="toggleSolved(${prob.id})">${isS?'✓':''}</div>
                        <a href="https://leetcode.com/problems/${prob.slug}" class="prob-link" target="_blank">${prob.name}</a>
                    </div>
                    <span class="diff-tag ${prob.diff}">${prob.diff}</span>
                    <button class="note-toggle">📝</button>
                    <button class="del-btn" onclick="deleteProblem('${p.name}', ${prob.id})">🗑️</button>
                </div>`;
        });
        body.appendChild(section);
    });
}

function toggleSolved(id) {
    solved.has(id) ? solved.delete(id) : solved.add(id);
    localStorage.setItem('lt-solved', JSON.stringify([...solved]));
    renderContent(); updateStats();
}

function deleteProblem(patName, id) {
    if(!confirm("Remove this problem?")) return;
    const pat = patterns.find(p => p.name === patName);
    pat.problems = pat.problems.filter(prob => prob.id !== id);
    saveAll();
}

function saveAll() {
    localStorage.setItem('lt-patterns', JSON.stringify(patterns));
    pushToGitHub();
    renderContent();
    updateStats();
}

function openAdd() {
    const sel = document.getElementById('add-pat');
    sel.innerHTML = patterns.map(p => `<option>${p.name}</option>`).join('');
    document.getElementById('add-modal').classList.add('open');
}
function closeAdd() { document.getElementById('add-modal').classList.remove('open'); }

function confirmAdd() {
    const patName = document.getElementById('add-pat').value;
    const newProb = {
        id: parseInt(document.getElementById('add-id').value),
        name: document.getElementById('add-name').value,
        diff: "Medium",
        slug: document.getElementById('add-slug').value
    };
    patterns.find(p => p.name === patName).problems.push(newProb);
    saveAll();
    closeAdd();
}

function openSettings() {
    document.getElementById('ghTokenInput').value = localStorage.getItem('gh_token') || '';
    document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings() {
    localStorage.setItem('gh_token', document.getElementById('ghTokenInput').value);
    closeSettings();
    pushToGitHub();
}

load();
</script>
</body>
</html>
